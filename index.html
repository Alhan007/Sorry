<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meri Qalabi ❤️</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #fbc2eb, #a18cd1);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ---------- ENVELOPE SCREEN ---------- */
        #envelope-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            cursor: pointer;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        #envelope-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .envelope-emoji {
            font-size: 6rem;
            animation: floatEnvelope 2.4s ease-in-out infinite, wiggle 3s ease-in-out infinite;
            filter: drop-shadow(0 10px 20px rgba(216, 27, 96, 0.35));
            position: relative;
            z-index: 2;
        }

        .glow-ring {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,64,129,0.35) 0%, rgba(255,64,129,0) 70%);
            animation: ringPulse 2.4s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes ringPulse {
            0%, 100% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.25); opacity: 1; }
        }

        .sparkle {
            position: absolute;
            font-size: 1.2rem;
            animation: sparkleFloat 2.6s ease-in-out infinite;
            opacity: 0.85;
            pointer-events: none;
        }

        @keyframes sparkleFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.5; }
            50% { transform: translateY(-10px) rotate(15deg); opacity: 1; }
        }

        @keyframes floatEnvelope {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-14px); }
        }

        @keyframes wiggle {
            0%, 85%, 100% { transform: rotate(0deg); }
            88% { transform: rotate(-6deg); }
            91% { transform: rotate(6deg); }
            94% { transform: rotate(-4deg); }
            97% { transform: rotate(0deg); }
        }

        .envelope-title {
            margin-top: 25px;
            font-family: 'Brush Script MT', cursive, sans-serif;
            font-size: 2rem;
            color: #d81b60;
            text-shadow: 2px 2px 4px rgba(216, 27, 96, 0.2);
        }

        .envelope-sub {
            margin-top: 10px;
            font-size: 15px;
            color: #7a2247;
            letter-spacing: 0.5px;
            animation: pulseText 1.8s ease-in-out infinite;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        #envelope-screen.opening .envelope-emoji {
            animation: openPop 0.7s ease forwards;
        }

        @keyframes openPop {
            0% { transform: scale(1) rotate(0deg); }
            40% { transform: scale(1.3) rotate(-8deg); }
            70% { transform: scale(1.5) rotate(6deg); }
            100% { transform: scale(2) rotate(0deg); opacity: 0; }
        }

        #envelope-screen.opening .envelope-title,
        #envelope-screen.opening .envelope-sub {
            animation: fadeOutUp 0.5s ease forwards;
        }

        @keyframes fadeOutUp {
            to { opacity: 0; transform: translateY(-20px); }
        }

        /* ---------- CARD (the letter) ---------- */
        .card {
            width: 90%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            text-align: center;
            position: relative;
            z-index: 10;
            opacity: 0;
            transform: translateY(40px) scale(0.9);
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        h1 {
            font-family: 'Brush Script MT', cursive, sans-serif;
            background: linear-gradient(90deg, #d81b60, #ff4081, #d81b60);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmer 3s linear infinite;
            font-size: 2.5rem;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(216, 27, 96, 0.15);
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .ambient-heart {
            position: fixed;
            bottom: -40px;
            z-index: 0;
            opacity: 0.5;
            pointer-events: none;
            animation: ambientFloat linear infinite;
        }

        @keyframes ambientFloat {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-115vh) translateX(20px) rotate(360deg); opacity: 0; }
        }

        p {
            font-size: 16px;
            line-height: 1.8;
            color: #444;
            margin-bottom: 30px;
        }

        p strong {
            color: #d81b60;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            padding: 16px;
            width: 100%;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.15s ease;
        }

        button:active {
            transform: scale(0.95);
        }

        .yes {
            background: linear-gradient(135deg, #e91e63, #ff4081);
            color: white;
            box-shadow: 0 8px 15px rgba(233, 30, 99, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(233, 30, 99, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(233, 30, 99, 0); }
            100% { box-shadow: 0 0 0 0 rgba(233, 30, 99, 0); }
        }

        .hug {
            background: #fff;
            color: #d81b60;
            border: 2px solid #ff4081;
        }

        #response {
            margin-top: 25px;
            font-size: 18px;
            color: #d81b60;
            font-weight: bold;
            min-height: 25px;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .heart {
            position: fixed;
            bottom: -50px;
            z-index: 1;
            animation: fly linear forwards;
            pointer-events: none;
        }

        @keyframes fly {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" autoplay loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <button id="musicBtn" onclick="toggleMusic()"
        style="
        position:fixed;
        top:20px;
        right:20px;
        padding:10px 15px;
        border:none;
        border-radius:50px;
        background:#ff4d79;
        color:white;
        cursor:pointer;
        z-index: 40;
        font-weight: bold;
        box-shadow: 0 6px 14px rgba(255, 77, 121, 0.4);">
        🎵 Pause Music
    </button>

    <!-- Envelope intro screen -->
    <div id="envelope-screen" onclick="openLetter(event)">
        <div style="position: relative; display: flex; justify-content: center; align-items: center;">
            <div class="glow-ring"></div>
            <div class="sparkle" style="top: -20px; left: -30px; animation-delay: 0.2s;">✨</div>
            <div class="sparkle" style="top: -10px; right: -35px; animation-delay: 0.8s;">✨</div>
            <div class="sparkle" style="bottom: -15px; left: -20px; animation-delay: 1.4s;">💫</div>
            <div class="envelope-emoji">💌</div>
        </div>
        <div class="envelope-title">A letter for you</div>
        <div class="envelope-sub">tap here to open the letter</div>
    </div>

    <div class="card" id="card">
        <h1>❤️ Meri Qalabi ❤️</h1>

        <p>
            bby maafi chahta, mai nahi krunga ab sey bby. <br>
            bby ho na meri, mai apko bahut <strong>pyaar</strong> krta hu <br>
            isliye hyper ho jata, over kr deta bby.<br>
            mai bby... i love you na. <br>
            <strong>bby na meri.</strong>
        </p>

        <div class="btn-container">
            <button class="yes" onclick="yes()">
                agar maaf kiya toh yaha click kro ❤️
            </button>

            <button class="hug" onclick="hug()">
                Hug 🤗
            </button>
        </div>

        <div id="response"></div>
    </div>

    <script>
        // Try to autoplay music as soon as the page loads.
        // Browsers block sound-autoplay without a prior tap, so we also
        // force-start it the moment the envelope is tapped (first interaction).
        const bgMusic = document.getElementById("bgMusic");
        const musicBtn = document.getElementById("musicBtn");
        let musicStarted = false;

        function startMusic() {
            if (musicStarted) return;
            bgMusic.play().then(() => {
                musicStarted = true;
                musicBtn.innerHTML = "🎵 Pause Music";
            }).catch(() => {
                // autoplay blocked, will retry on next tap
            });
        }

        function toggleMusic() {
            if (bgMusic.paused) {
                bgMusic.play();
                musicBtn.innerHTML = "🎵 Pause Music";
                musicStarted = true;
            } else {
                bgMusic.pause();
                musicBtn.innerHTML = "🎵 Play Music";
            }
        }

        window.addEventListener("load", startMusic);
        document.body.addEventListener("click", startMusic, { once: true });

        // gentle ambient hearts floating in the background at all times
        function spawnAmbientHeart() {
            const emojis = ['❤️', '💕', '💖', '✨'];
            let h = document.createElement("div");
            h.className = "ambient-heart";
            h.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            h.style.left = Math.random() * 100 + "vw";
            h.style.fontSize = (14 + Math.random() * 16) + "px";
            let duration = 6 + Math.random() * 5;
            h.style.animationDuration = duration + "s";
            document.body.appendChild(h);
            setTimeout(() => h.remove(), duration * 1000);
        }
        setInterval(spawnAmbientHeart, 900);
        spawnAmbientHeart();

        function burstSparkles(x, y) {
            const emojis = ['✨', '💫', '💖'];
            for (let i = 0; i < 14; i++) {
                let s = document.createElement("div");
                s.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                s.style.position = "fixed";
                s.style.left = x + "px";
                s.style.top = y + "px";
                s.style.fontSize = (14 + Math.random() * 14) + "px";
                s.style.zIndex = 30;
                s.style.pointerEvents = "none";
                const angle = (Math.PI * 2 * i) / 14;
                const dist = 60 + Math.random() * 60;
                const dx = Math.cos(angle) * dist;
                const dy = Math.sin(angle) * dist;
                s.style.transition = "transform 0.8s cubic-bezier(0.16,1,0.3,1), opacity 0.8s ease";
                s.style.transform = "translate(0, 0) scale(1)";
                s.style.opacity = "1";
                document.body.appendChild(s);
                requestAnimationFrame(() => {
                    s.style.transform = `translate(${dx}px, ${dy}px) scale(0.3)`;
                    s.style.opacity = "0";
                });
                setTimeout(() => s.remove(), 850);
            }
        }

        function openLetter(e) {
            const envelope = document.getElementById("envelope-screen");
            const card = document.getElementById("card");
            const rect = envelope.getBoundingClientRect();
            const cx = e ? e.clientX : rect.left + rect.width / 2;
            const cy = e ? e.clientY : rect.top + rect.height / 2;

            burstSparkles(cx, cy);
            envelope.classList.add("opening");

            setTimeout(() => {
                envelope.classList.add("hidden");
                card.classList.add("show");
            }, 550);
        }

        function yes() {
            document.getElementById("response").innerHTML = "Love you bby — ab sey aisa nahi hoga, promise. 💕";

            const emojis = ['❤️', '💖', '💕', '🥰', '✨'];

            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    let h = document.createElement("div");
                    h.className = "heart";
                    h.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                    h.style.left = Math.random() * 100 + "vw";
                    h.style.fontSize = (20 + Math.random() * 20) + "px";

                    let duration = 3 + Math.random() * 2;
                    h.style.animationDuration = duration + "s";

                    document.body.appendChild(h);

                    setTimeout(() => h.remove(), duration * 1000);
                }, i * 40);
            }
        }

        function hug() {
            document.getElementById("response").innerHTML = "Aajaiye na bby, galey lagane ka mn kr raha bahut. 🤗💖";
        }
    </script>

</body>
</html>
